name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
        shell: bash

      - name: Deploy to server
        env:
          USER: ${{ secrets.USER }}
          HOST: ${{ secrets.HOST }}
          # Bu yerda loyiha serverning qayerida turishini ko'rsatasiz
          APP_DIR: "/projects/3-dars" 
        run: |
          ssh $USER@$HOST << EOF
            set -e

            # 1. Papka bor-yo'qligini tekshirish
            if [ ! -d "$APP_DIR" ]; then
              echo "Directory $APP_DIR does not exist. Creating..."
              mkdir -p "$APP_DIR"
              # Repo-ni birinchi marta klon qilish
              git clone https://github.com/behzod-abdullayev/8-oy-2-dars.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # 2. .git papkasi borligini tekshirish (xavfsizlik uchun)
            if [ ! -d .git ]; then
              echo "❌ Repo not cloned properly. Aborting."
              exit 1
            fi

            # 3. Kodni yangilash va qayta ishga tushirish
            git pull origin main
            npm install
            npm run build
            
            # PM2 orqali restart qilish (agar yo'q bo'lsa yangi yaratadi)
            pm2 restart 3-dars || pm2 start dist/main.js --name "3-dars"
          EOF
        shell: bash